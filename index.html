<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朔日工房 - VPM Repository</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #667eea;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #666;
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }

    .vpm-url {
      background: #f5f5f5;
      border-left: 4px solid #667eea;
      padding: 1rem;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.95rem;
      word-break: break-all;
      margin-top: 1rem;
    }

    .vpm-url-label {
      font-weight: bold;
      color: #667eea;
      margin-bottom: 0.5rem;
    }

    .stats {
      display: flex;
      gap: 2rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #e0e0e0;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      color: #666;
      font-size: 0.9rem;
    }

    .packages {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1.5rem;
    }

    .package-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .package-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .package-header {
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #f0f0f0;
    }

    .package-name {
      font-size: 1.4rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 0.25rem;
    }

    .package-id {
      font-size: 0.85rem;
      color: #999;
      font-family: monospace;
    }

    .package-version {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      margin-top: 0.5rem;
    }

    .package-description {
      color: #666;
      margin-bottom: 1rem;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .package-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.85rem;
      color: #666;
    }

    .meta-icon {
      color: #667eea;
    }

    .package-links {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s, transform 0.2s;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
    }

    .versions-dropdown {
      position: relative;
      display: inline-block;
    }

    .versions-btn {
      background: #f0f0f0;
      color: #333;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .versions-btn:hover {
      background: #e0e0e0;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: white;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .packages {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 2rem;
      }

      .stats {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>朔日工房</h1>
      <p class="subtitle">VPM Package Repository by sakuhanight</p>

      <div class="vpm-url">
        <div class="vpm-url-label">📦 VPM Repository URL:</div>
        <code>https://vpm.t7i.io/vpm.json</code>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-value">0</span>
          <span class="stat-label">パッケージ</span>
        </div>
        <div class="stat">
          <span class="stat-value">0</span>
          <span class="stat-label">総バージョン数</span>
        </div>
      </div>
    </header>

    <div class="packages">
      
    </div>

    <footer>
      <p>Powered by VPM (VRChat Package Manager)</p>
      <p>Generated at 2026-04-18T14:09:12.311Z</p>
    </footer>
  </div>
</body>
</html>
