<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>朔日工房 - VPM Repository</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: "#667eea",
                            secondary: "#764ba2",
                        },
                    },
                },
            };
        </script>
    </head>
    <body class="bg-gradient-to-br from-primary to-secondary min-h-screen">
        <div class="container mx-auto px-4 py-8 max-w-7xl">
            <!-- Header -->
            <header class="bg-white rounded-xl shadow-lg p-8 mb-8">
                <h1 class="text-4xl font-bold text-primary mb-2">朔日工房</h1>
                <p class="text-xl text-gray-600 mb-4">
                    VPM Package Repository by 朔日工房
                </p>

                <div
                    class="bg-gray-50 border-l-4 border-primary rounded-lg p-4 mt-6"
                >
                    <div class="font-bold text-primary mb-2">
                        📦 VPM Repository URL:
                    </div>
                    <code class="text-sm break-all">https://vpm.t7i.io/vpm.json</code>
                </div>

                <div
                    class="flex flex-wrap gap-8 mt-6 pt-6 border-t border-gray-200"
                >
                    <div class="flex items-center gap-2">
                        <span class="text-3xl font-bold text-primary"
                            >1</span
                        >
                        <span class="text-gray-600">パッケージ</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-3xl font-bold text-primary"
                            >1</span
                        >
                        <span class="text-gray-600">総バージョン数</span>
                    </div>
                </div>
            </header>

            <!-- Packages Grid -->
            <div
                id="packages"
                class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
            >
                <!-- Packages will be inserted here -->
            </div>

            <!-- Footer -->
            <footer class="text-center mt-12 text-white">
                <p class="text-sm opacity-80">Generated at 2026-04-19T09:21:55.811Z</p>
            </footer>
        </div>

        <script>
            const packages = {
  "net.tsuitachi.sf-equipment": {
    "versions": {
      "0.1.0": {
        "name": "net.tsuitachi.sf-equipment",
        "displayName": "Tsuitachi-SF-Equipment",
        "version": "0.1.0",
        "url": "https://github.com/sakuhanight/Tsuitachi-SF-Equipment/releases/download/v0.1.0/Tsuitachi-SF-Equipment-v0.1.0.zip",
        "author": "sakuhanight",
        "description": "Advanced equipment for SaccFlightAndVehicles 1.8",
        "unity": "2022.3",
        "documentationUrl": "https://github.com/sakuhanight/Tsuitachi-SF-Equipment/wiki",
        "changelogUrl": "https://github.com/sakuhanight/Tsuitachi-SF-Equipment/releases",
        "license": "MIT",
        "homepage": "https://github.com/sakuhanight/Tsuitachi-SF-Equipment"
      }
    }
  }
};
            const packagesContainer = document.getElementById('packages');

            Object.entries(packages).forEach(([name, pkgIndex]) => {
              const versions = Object.entries(pkgIndex.versions);
              const [latestVersion, pkg] = versions[versions.length - 1];
              const authorName = typeof pkg.author === 'string' ? pkg.author : pkg.author.name;
              const allVersions = versions.map(([v]) => v).reverse();

              const card = document.createElement('div');
              card.className = 'bg-white rounded-xl shadow-lg p-6 transition-all duration-200 hover:-translate-y-2 hover:shadow-xl';

              card.innerHTML = `
                <div class="border-b-2 border-gray-100 pb-4 mb-4">
                  <h2 class="text-2xl font-bold text-gray-800 mb-1">${pkg.displayName}</h2>
                  <p class="text-sm text-gray-500 font-mono">${pkg.name}</p>
                  <span class="inline-block bg-primary text-white px-3 py-1 rounded-full text-sm font-bold mt-2">
                    v${latestVersion}
                  </span>
                </div>

                ${pkg.description ? `<p class="text-gray-600 mb-4 leading-relaxed">${pkg.description}</p>` : ''}

                <div class="flex flex-wrap gap-3 mb-4 text-sm text-gray-600">
                  <div class="flex items-center gap-1">
                    <span>👤</span>
                    <span>${authorName}</span>
                  </div>
                  ${pkg.license ? `
                    <div class="flex items-center gap-1">
                      <span>📄</span>
                      <span>${pkg.license}</span>
                    </div>
                  ` : ''}
                  ${pkg.unity ? `
                    <div class="flex items-center gap-1">
                      <span>🎮</span>
                      <span>Unity ${pkg.unity}+</span>
                    </div>
                  ` : ''}
                  ${allVersions.length > 1 ? `
                    <div class="flex items-center gap-1">
                      <span>📚</span>
                      <span>${allVersions.length} versions</span>
                    </div>
                  ` : ''}
                </div>

                <div class="flex flex-wrap gap-2">
                  <a href="${pkg.url}"
                     class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition-colors duration-200 text-sm font-medium"
                     download>
                    ⬇️ Download
                  </a>
                  ${pkg.documentationUrl ? `
                    <a href="${pkg.documentationUrl}"
                       class="bg-gray-100 hover:bg-gray-200 text-gray-800 px-4 py-2 rounded-lg transition-colors duration-200 text-sm font-medium"
                       target="_blank">
                      📖 Docs
                    </a>
                  ` : ''}
                  ${pkg.homepage ? `
                    <a href="${pkg.homepage}"
                       class="bg-gray-100 hover:bg-gray-200 text-gray-800 px-4 py-2 rounded-lg transition-colors duration-200 text-sm font-medium"
                       target="_blank">
                      🏠 Homepage
                    </a>
                  ` : ''}
                </div>
              `;

              packagesContainer.appendChild(card);
            });

            // Show message if no packages
            if (Object.keys(packages).length === 0) {
              packagesContainer.innerHTML = `
                <div class="col-span-full bg-white rounded-xl shadow-lg p-12 text-center">
                  <div class="text-6xl mb-4">📦</div>
                  <h3 class="text-2xl font-bold text-gray-800 mb-2">パッケージがまだありません</h3>
                  <p class="text-gray-600">最初のパッケージがリリースされるまでお待ちください。</p>
                </div>
              `;
            }
        </script>
    </body>
</html>
