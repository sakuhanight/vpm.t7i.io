name: Update VPM Package (Reusable)

on:
  workflow_call:
    inputs:
      package_name:
        description: 'VPM Package name (e.g., io.t7i.mypackage)'
        required: true
        type: string
      package_display_name:
        description: 'VPM Package display name'
        required: true
        type: string
      package_version:
        description: 'Package version (e.g., 1.0.0)'
        required: true
        type: string
      release_url:
        description: 'URL to the release ZIP file'
        required: true
        type: string
      package_description:
        description: 'Package description'
        required: false
        type: string
        default: ''
      package_author:
        description: 'Package author (JSON string or simple string)'
        required: false
        type: string
        default: '朔日工房'
      unity_version:
        description: 'Unity version requirement'
        required: false
        type: string
        default: ''
      license:
        description: 'Package license'
        required: false
        type: string
        default: ''
      homepage:
        description: 'Package homepage URL'
        required: false
        type: string
        default: ''
      documentation_url:
        description: 'Documentation URL'
        required: false
        type: string
        default: ''
      changelog_url:
        description: 'Changelog URL'
        required: false
        type: string
        default: ''
      repository:
        description: 'Repository info (JSON string)'
        required: false
        type: string
        default: ''
      vpm_dependencies:
        description: 'VPM dependencies (JSON string)'
        required: false
        type: string
        default: '{}'
      zip_sha256:
        description: 'SHA256 hash of the ZIP file'
        required: false
        type: string
        default: ''

jobs:
  update-vpm:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout vpm.t7i.io repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Create VPM package manifest
        id: manifest
        run: |
          mkdir -p packages

          # JSON構築
          cat > "packages/${{ inputs.package_name }}.json" <<'EOF'
          {
            "name": "${{ inputs.package_name }}",
            "displayName": "${{ inputs.package_display_name }}",
            "version": "${{ inputs.package_version }}",
            "url": "${{ inputs.release_url }}",
            "author": ${{ inputs.package_author != '' && inputs.package_author || '"朔日工房"' }}
            ${{ inputs.package_description != '' && format(', "description": "{0}"', inputs.package_description) || '' }}
            ${{ inputs.unity_version != '' && format(', "unity": "{0}"', inputs.unity_version) || '' }}
            ${{ inputs.license != '' && format(', "license": "{0}"', inputs.license) || '' }}
            ${{ inputs.homepage != '' && format(', "homepage": "{0}"', inputs.homepage) || '' }}
            ${{ inputs.documentation_url != '' && format(', "documentationUrl": "{0}"', inputs.documentation_url) || '' }}
            ${{ inputs.changelog_url != '' && format(', "changelogUrl": "{0}"', inputs.changelog_url) || '' }}
            ${{ inputs.repository != '' && format(', "repository": {0}', inputs.repository) || '' }}
            ${{ inputs.vpm_dependencies != '{}' && format(', "vpmDependencies": {0}', inputs.vpm_dependencies) || '' }}
            ${{ inputs.zip_sha256 != '' && format(', "zipSHA256": "{0}"', inputs.zip_sha256) || '' }}
          }
          EOF

          # Format JSON properly
          cat "packages/${{ inputs.package_name }}.json" | jq '.' > temp.json
          mv temp.json "packages/${{ inputs.package_name }}.json"

          echo "Created manifest:"
          cat "packages/${{ inputs.package_name }}.json"

      - name: Validate manifest
        run: npm run validate-manifest "packages/${{ inputs.package_name }}.json"

      - name: Generate VPM repository
        run: npm run dev vpm.json

      - name: Generate HTML page
        run: npm run generate-html vpm.json index.html

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/ vpm.json index.html
          git commit -m "Update package: ${{ inputs.package_name }}@${{ inputs.package_version }}" || echo "No changes to commit"
          git push
